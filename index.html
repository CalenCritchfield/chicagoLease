<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicago Property Map</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e8eaf0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* HEADER */
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        background: #161922;
        border-bottom: 1px solid #2a2d38;
        flex-shrink: 0;
      }
      .logo {
        width: 30px;
        height: 30px;
        background: #2563eb;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      header h1 {
        font-size: 15px;
        font-weight: 600;
        color: #f0f2f8;
      }
      .header-stats {
        margin-left: auto;
        display: flex;
        gap: 18px;
      }
      .stat {
        text-align: right;
      }
      .stat-val {
        font-size: 18px;
        font-weight: 700;
        color: #60a5fa;
        line-height: 1;
      }
      .stat-lbl {
        font-size: 10px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* LAYOUT */
      .app-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* SIDEBAR */
      .sidebar {
        width: 340px;
        flex-shrink: 0;
        background: #161922;
        border-right: 1px solid #2a2d38;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* TABS (CSV / Add / Search) */
      .mode-tabs {
        display: flex;
        border-bottom: 1px solid #2a2d38;
        flex-shrink: 0;
      }
      .mode-tab {
        flex: 1;
        padding: 10px 6px;
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
        color: #6b7280;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
      }
      .mode-tab.active {
        color: #60a5fa;
        border-bottom-color: #2563eb;
      }

      /* PANELS */
      .panel {
        display: none;
        padding: 14px;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        flex-shrink: 0;
      }
      .panel.active {
        display: flex;
      }

      /* Upload zone */
      .upload-zone {
        border: 2px dashed #2a2d38;
        border-radius: 10px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        background: #0f1117;
      }
      .upload-zone:hover,
      .upload-zone.drag-over {
        border-color: #2563eb;
        background: #1a2236;
      }
      .upload-zone input {
        display: none;
      }
      .upload-icon {
        font-size: 22px;
        margin-bottom: 4px;
      }
      .upload-zone p {
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.5;
      }
      .upload-zone strong {
        color: #60a5fa;
      }

      /* Column mapper */
      .mapper {
        display: none;
        flex-direction: column;
        gap: 7px;
      }
      .mapper.visible {
        display: flex;
      }
      .mapper label {
        font-size: 10px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      .mapper select {
        width: 100%;
        padding: 7px 10px;
        background: #0f1117;
        border: 1px solid #2a2d38;
        border-radius: 6px;
        color: #e8eaf0;
        font-size: 12px;
        margin-top: 2px;
      }
      .mapper-row {
        display: flex;
        flex-direction: column;
      }

      /* Shared input style */
      .field-label {
        font-size: 10px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 3px;
        display: block;
      }
      .field-input {
        width: 100%;
        padding: 8px 10px;
        background: #0f1117;
        border: 1px solid #2a2d38;
        border-radius: 7px;
        color: #e8eaf0;
        font-size: 13px;
        transition: border-color 0.15s;
      }
      .field-input:focus {
        outline: none;
        border-color: #2563eb;
      }
      .field-input::placeholder {
        color: #4b5563;
      }
      textarea.field-input {
        resize: vertical;
        min-height: 60px;
      }

      /* Buttons */
      .btn-primary {
        width: 100%;
        padding: 9px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-primary:hover {
        background: #1d4ed8;
      }
      .btn-primary:disabled {
        background: #374151;
        color: #6b7280;
        cursor: not-allowed;
      }

      .btn-secondary {
        width: 100%;
        padding: 9px;
        background: transparent;
        color: #60a5fa;
        border: 1px solid #2563eb;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-secondary:hover {
        background: #1a2236;
      }

      /* Address search results */
      .addr-results {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .addr-result-item {
        padding: 8px 10px;
        background: #0f1117;
        border: 1px solid #2a2d38;
        border-radius: 7px;
        cursor: pointer;
        font-size: 12px;
        color: #9ca3af;
        transition: all 0.15s;
      }
      .addr-result-item:hover {
        border-color: #2563eb;
        color: #e8eaf0;
        background: #1a2236;
      }
      .addr-result-name {
        font-weight: 600;
        color: #e8eaf0;
        font-size: 13px;
        margin-bottom: 2px;
      }

      /* Filter tabs */
      .filter-tabs {
        display: flex;
        gap: 5px;
        padding: 10px 14px 0;
        flex-shrink: 0;
      }
      .tab {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid #2a2d38;
        background: transparent;
        color: #6b7280;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tab.active {
        background: #2563eb;
        border-color: #2563eb;
        color: #fff;
      }

      /* List search */
      .search-wrap {
        padding: 10px 14px;
        border-bottom: 1px solid #2a2d38;
        flex-shrink: 0;
      }
      .search-wrap input {
        width: 100%;
        padding: 7px 12px;
        background: #0f1117;
        border: 1px solid #2a2d38;
        border-radius: 8px;
        color: #e8eaf0;
        font-size: 12px;
      }
      .search-wrap input:focus {
        outline: none;
        border-color: #2563eb;
      }
      .search-wrap input::placeholder {
        color: #4b5563;
      }

      /* Property list */
      .prop-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
      }
      .prop-list::-webkit-scrollbar {
        width: 4px;
      }
      .prop-list::-webkit-scrollbar-thumb {
        background: #2a2d38;
        border-radius: 4px;
      }

      .prop-item {
        padding: 9px 14px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition:
          background 0.15s,
          border-color 0.15s;
        position: relative;
      }
      .prop-item:hover {
        background: #1e2130;
      }
      .prop-item.active {
        background: #1a2236;
        border-left-color: #2563eb;
      }
      .prop-name {
        font-size: 13px;
        font-weight: 600;
        color: #f0f2f8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .prop-addr {
        font-size: 11px;
        color: #6b7280;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .prop-price {
        font-size: 11px;
        color: #34d399;
        margin-top: 2px;
        font-weight: 600;
      }
      .prop-badge {
        display: inline-block;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 5px;
        border-radius: 4px;
        margin-top: 3px;
        font-weight: 700;
      }
      .badge-chicago {
        background: #1e3a5f;
        color: #60a5fa;
      }
      .badge-other {
        background: #2a1f1f;
        color: #f87171;
      }
      .badge-manual {
        background: #1a2e1a;
        color: #34d399;
      }

      .prop-delete {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #4b5563;
        cursor: pointer;
        font-size: 14px;
        padding: 2px 5px;
        border-radius: 4px;
        transition:
          color 0.15s,
          background 0.15s;
        display: none;
      }
      .prop-item:hover .prop-delete {
        display: block;
      }
      .prop-delete:hover {
        color: #f87171;
        background: #2a1f1f;
      }

      .empty-state {
        padding: 36px 20px;
        text-align: center;
        color: #4b5563;
        font-size: 12px;
        line-height: 1.8;
      }

      /* MAP */
      #map {
        flex: 1;
        background: #0f1117;
      }

      /* Leaflet popup */
      .leaflet-popup-content-wrapper {
        background: #1e2130;
        color: #e8eaf0;
        border: 1px solid #2a2d38;
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      .leaflet-popup-tip {
        background: #1e2130;
      }
      .leaflet-popup-content {
        margin: 12px 14px;
        font-size: 12px;
        line-height: 1.6;
      }
      .popup-name {
        font-size: 14px;
        font-weight: 700;
        color: #60a5fa;
        margin-bottom: 5px;
      }
      .popup-row {
        color: #9ca3af;
      }
      .popup-row strong {
        color: #e8eaf0;
      }
      .popup-price {
        color: #34d399;
        font-weight: 700;
        font-size: 13px;
        margin-top: 5px;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1e2130;
        border: 1px solid #2a2d38;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 13px;
        color: #e8eaf0;
        display: none;
        z-index: 9999;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      .toast.show {
        display: block;
        animation: fadeIn 0.2s;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Modal for editing */
      .modal-bg {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal-bg.open {
        display: flex;
      }
      .modal {
        background: #1e2130;
        border: 1px solid #2a2d38;
        border-radius: 14px;
        padding: 22px;
        width: 340px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      }
      .modal h3 {
        font-size: 15px;
        font-weight: 700;
        color: #f0f2f8;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .modal-actions .btn-primary {
        flex: 1;
      }
      .modal-actions .btn-secondary {
        flex: 1;
      }
      .divider {
        border: none;
        border-top: 1px solid #2a2d38;
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">🏙</div>
      <h1>Chicago Property Map</h1>
      <div class="header-stats">
        <div class="stat">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-chicago">0</div>
          <div class="stat-lbl">In Chicago</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-other">0</div>
          <div class="stat-lbl">Outside</div>
        </div>
      </div>
    </header>

    <div class="app-body">
      <div class="sidebar">
        <!-- Mode tabs -->
        <div class="mode-tabs">
          <button class="mode-tab active" onclick="switchMode('csv', this)">
            📂 CSV Upload
          </button>
          <button class="mode-tab" onclick="switchMode('add', this)">
            ➕ Add Property
          </button>
          <button class="mode-tab" onclick="switchMode('search', this)">
            🔍 Find Address
          </button>
        </div>

        <!-- CSV PANEL -->
        <div class="panel active" id="panel-csv">
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="csvFile" accept=".csv" />
            <div class="upload-icon">📂</div>
            <p>Drop CSV here or <strong>click to browse</strong></p>
          </div>
          <div class="mapper" id="mapper">
            <div class="mapper-row">
              <label>Address column <span style="color: #f87171">*</span></label
              ><select id="colAddress"></select>
            </div>
            <div class="mapper-row">
              <label>Property name column</label
              ><select id="colName"></select>
            </div>
            <div class="mapper-row">
              <label>Price / value column</label
              ><select id="colPrice"></select>
            </div>
            <div class="mapper-row">
              <label>Other details column</label
              ><select id="colOther"></select>
            </div>
          </div>
          <button
            class="btn-primary"
            id="mapBtn"
            style="display: none"
            onclick="processProperties()"
          >
            📍 Map Properties
          </button>
        </div>

        <!-- ADD PROPERTY PANEL -->
        <div class="panel" id="panel-add">
          <div>
            <label class="field-label">Property Name</label>
            <input
              class="field-input"
              id="addName"
              placeholder="e.g. Lincoln Park Condo"
            />
          </div>
          <div>
            <label class="field-label"
              >Address <span style="color: #f87171">*</span></label
            >
            <input
              class="field-input"
              id="addAddress"
              placeholder="e.g. 123 N Michigan Ave, Chicago, IL"
            />
          </div>
          <div>
            <label class="field-label">Price / Value</label>
            <input
              class="field-input"
              id="addPrice"
              placeholder="e.g. $450,000"
            />
          </div>
          <div>
            <label class="field-label">Other Details</label>
            <textarea
              class="field-input"
              id="addOther"
              placeholder="Beds, baths, notes…"
            ></textarea>
          </div>
          <button class="btn-primary" id="addBtn" onclick="addManualProperty()">
            📍 Add to Map
          </button>
        </div>

        <!-- FIND ADDRESS PANEL -->
        <div class="panel" id="panel-search">
          <div>
            <label class="field-label">Search any address</label>
            <input
              class="field-input"
              id="addrSearchInput"
              placeholder="e.g. Wrigley Field, Chicago"
              onkeydown="if (event.key === 'Enter') searchAddress();"
            />
          </div>
          <button
            class="btn-primary"
            id="addrSearchBtn"
            onclick="searchAddress()"
          >
            🔍 Search
          </button>
          <div class="addr-results" id="addrResults"></div>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
          <button class="tab active" onclick="setFilter('all', this)">
            All
          </button>
          <button class="tab" onclick="setFilter('chicago', this)">
            Chicago
          </button>
          <button class="tab" onclick="setFilter('other', this)">
            Outside
          </button>
          <button class="tab" onclick="setFilter('manual', this)">Added</button>
        </div>

        <!-- List search -->
        <div class="search-wrap">
          <input
            type="text"
            id="searchBox"
            placeholder="Search properties…"
            oninput="renderList()"
          />
        </div>

        <!-- Property list -->
        <div class="prop-list" id="propList">
          <div class="empty-state">
            Upload a CSV or add a property<br />to get started.
          </div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <!-- Edit modal -->
    <div class="modal-bg" id="editModal">
      <div class="modal">
        <h3>Edit Property</h3>
        <div>
          <label class="field-label">Property Name</label>
          <input class="field-input" id="editName" />
        </div>
        <div>
          <label class="field-label">Address</label>
          <input class="field-input" id="editAddress" />
        </div>
        <div>
          <label class="field-label">Price / Value</label>
          <input class="field-input" id="editPrice" />
        </div>
        <div>
          <label class="field-label">Other Details</label>
          <textarea class="field-input" id="editOther"></textarea>
        </div>
        <hr class="divider" />
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeEdit()">Cancel</button>
          <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // ── State ──
      let allProperties = [];
      let markerObjects = []; // parallel array: markerObjects[i] = leaflet marker or null
      let map,
        activeFilter = "all",
        activeIndex = -1;
      let csvHeaders = [],
        pendingRows = [];
      let editingIndex = -1;

      // ── Map ──
      map = L.map("map", { zoomControl: true }).setView(
        [41.8781, -87.6298],
        11,
      );
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        {
          attribution: "© OpenStreetMap © CARTO",
          subdomains: "abcd",
          maxZoom: 19,
        },
      ).addTo(map);

      function makeIcon(color) {
        return L.divIcon({
          className: "",
          html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7],
          popupAnchor: [0, -10],
        });
      }

      function propColor(p) {
        if (p.manual) return "#34d399";
        return p.inCity ? "#3b82f6" : "#f87171";
      }

      // ── Mode tabs ──
      function switchMode(mode, el) {
        document
          .querySelectorAll(".mode-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".panel")
          .forEach((p) => p.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("panel-" + mode).classList.add("active");
      }

      // ── Upload ──
      const zone = document.getElementById("uploadZone");
      const fileInput = document.getElementById("csvFile");
      zone.addEventListener("click", () => fileInput.click());
      zone.addEventListener("dragover", (e) => {
        e.preventDefault();
        zone.classList.add("drag-over");
      });
      zone.addEventListener("dragleave", () =>
        zone.classList.remove("drag-over"),
      );
      zone.addEventListener("drop", (e) => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
      });

      function handleFile(file) {
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: (result) => {
            csvHeaders = result.meta.fields || [];
            pendingRows = result.data;
            if (!csvHeaders.length) {
              showToast("CSV appears empty.");
              return;
            }
            populateMapper();
            document.getElementById("mapper").classList.add("visible");
            document.getElementById("mapBtn").style.display = "block";
            zone.querySelector("p").innerHTML =
              `<strong>${file.name}</strong> — ${pendingRows.length} rows`;
            showToast(
              `Loaded ${pendingRows.length} rows. Confirm columns then click "Map Properties".`,
            );
          },
          error: () => showToast("Could not parse file."),
        });
      }

      function populateMapper() {
        const ids = ["colAddress", "colName", "colPrice", "colOther"];
        const labels = ["address", "name", "price", "other"];
        ids.forEach((id, i) => {
          const sel = document.getElementById(id);
          sel.innerHTML =
            `<option value="">— not mapped —</option>` +
            csvHeaders
              .map((h) => {
                const l = h.toLowerCase();
                const guess =
                  l.includes(labels[i]) ||
                  (i === 0 && l.includes("addr")) ||
                  (i === 1 &&
                    (l.includes("name") ||
                      l.includes("title") ||
                      l.includes("property"))) ||
                  (i === 2 &&
                    (l.includes("price") ||
                      l.includes("value") ||
                      l.includes("amount")));
                return `<option value="${h}"${guess ? " selected" : ""}>${h}</option>`;
              })
              .join("");
        });
      }

      // ── Geocode (Nominatim) ──
      async function geocode(address) {
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(address)}`,
            { headers: { "Accept-Language": "en" } },
          );
          return await res.json();
        } catch (e) {
          return [];
        }
      }

      function isInChicago(lat, lng) {
        return (
          lat >= 41.644 && lat <= 42.023 && lng >= -87.94 && lng <= -87.524
        );
      }

      // ── Process CSV ──
      async function processProperties() {
        const colAddr = document.getElementById("colAddress").value;
        const colName = document.getElementById("colName").value;
        const colPrice = document.getElementById("colPrice").value;
        const colOther = document.getElementById("colOther").value;
        if (!colAddr) {
          showToast("Please select the Address column.");
          return;
        }

        const btn = document.getElementById("mapBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Geocoding…";

        // Remove CSV-sourced markers only (keep manual ones)
        const keepProps = allProperties.filter((p) => p.manual);
        const keepMarkers = keepProps.map((p) => markerObjects[p.index]);
        allProperties
          .filter((p) => !p.manual)
          .forEach((p) => {
            if (markerObjects[p.index]) map.removeLayer(markerObjects[p.index]);
          });
        allProperties = keepProps;
        markerObjects = [];

        // Re-index kept manual props
        allProperties.forEach((p, i) => {
          p.index = i;
          markerObjects[i] = keepMarkers[i];
        });

        for (let i = 0; i < pendingRows.length; i++) {
          const row = pendingRows[i];
          const rawAddr = (row[colAddr] || "").trim();
          if (!rawAddr) continue;
          btn.textContent = `⏳ ${i + 1} / ${pendingRows.length}`;
          const results = await geocode(rawAddr);
          await new Promise((r) => setTimeout(r, 350));
          const geo = results[0]
            ? {
                lat: parseFloat(results[0].lat),
                lng: parseFloat(results[0].lon),
              }
            : null;
          const inCity = geo ? isInChicago(geo.lat, geo.lng) : false;
          const prop = {
            name: colName ? row[colName] || rawAddr : rawAddr,
            address: rawAddr,
            price: colPrice ? row[colPrice] || "" : "",
            other: colOther ? row[colOther] || "" : "",
            geo,
            inCity,
            manual: false,
            index: allProperties.length,
          };
          allProperties.push(prop);
          const marker = addMarker(prop);
          markerObjects.push(marker);
        }

        updateStats();
        renderList();
        fitChicago();
        btn.disabled = false;
        btn.textContent = "🔄 Re-map Properties";
        showToast(
          `Done! ${allProperties.filter((p) => p.inCity).length} properties in Chicago.`,
        );
      }

      // ── Add manual property ──
      async function addManualProperty() {
        const address = document.getElementById("addAddress").value.trim();
        if (!address) {
          showToast("Please enter an address.");
          return;
        }
        const btn = document.getElementById("addBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Looking up…";

        const results = await geocode(address);
        const geo = results[0]
          ? { lat: parseFloat(results[0].lat), lng: parseFloat(results[0].lon) }
          : null;
        if (!geo) {
          showToast("Could not find that address. Try adding a city or ZIP.");
          btn.disabled = false;
          btn.textContent = "📍 Add to Map";
          return;
        }

        const inCity = isInChicago(geo.lat, geo.lng);
        const prop = {
          name: document.getElementById("addName").value.trim() || address,
          address,
          price: document.getElementById("addPrice").value.trim(),
          other: document.getElementById("addOther").value.trim(),
          geo,
          inCity,
          manual: true,
          index: allProperties.length,
        };
        allProperties.push(prop);
        const marker = addMarker(prop);
        markerObjects.push(marker);

        // zoom to it
        map.setView([geo.lat, geo.lng], 15);
        marker && marker.openPopup();

        // clear form
        ["addName", "addAddress", "addPrice", "addOther"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        btn.disabled = false;
        btn.textContent = "📍 Add to Map";
        updateStats();
        renderList();
        showToast(
          `"${prop.name}" added — ${inCity ? "in Chicago ✓" : "outside Chicago"}`,
        );
      }

      // ── Find Address (search panel) ──
      async function searchAddress() {
        const q = document.getElementById("addrSearchInput").value.trim();
        if (!q) return;
        const btn = document.getElementById("addrSearchBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Searching…";
        const results = await geocode(q);
        btn.disabled = false;
        btn.textContent = "🔍 Search";

        const container = document.getElementById("addrResults");
        if (!results.length) {
          container.innerHTML =
            '<div style="font-size:12px;color:#6b7280">No results found.</div>';
          return;
        }

        container.innerHTML = results
          .slice(0, 5)
          .map((r, i) => {
            const lat = parseFloat(r.lat),
              lng = parseFloat(r.lon);
            const inCity = isInChicago(lat, lng);
            return `<div class="addr-result-item" onclick="jumpToResult(${lat},${lng},'${escJs(r.display_name)}')">
      <div class="addr-result-name">${escHtml(r.display_name.split(",")[0])}</div>
      <div style="font-size:11px;margin-top:2px">${escHtml(r.display_name.split(",").slice(1, 3).join(",").trim())}
        ${inCity ? '<span style="color:#60a5fa;margin-left:6px">✓ Chicago</span>' : ""}
      </div>
    </div>`;
          })
          .join("");
      }

      function jumpToResult(lat, lng, displayName) {
        map.setView([lat, lng], 16);
        L.popup({ className: "search-popup" })
          .setLatLng([lat, lng])
          .setContent(
            `<div class="popup-name">📍 Found</div><div class="popup-row">${escHtml(displayName)}</div>
      <div style="margin-top:8px">
        <button onclick="addFromSearch(${lat},${lng},'${escJs(displayName)}')" style="padding:5px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer">Add as Property</button>
      </div>`,
          )
          .openOn(map);
      }

      function addFromSearch(lat, lng, displayName) {
        map.closePopup();
        // Pre-fill the Add panel
        const shortName = displayName.split(",")[0];
        document.getElementById("addName").value = shortName;
        document.getElementById("addAddress").value = displayName
          .split(",")
          .slice(0, 3)
          .join(",")
          .trim();
        switchMode("add", document.querySelectorAll(".mode-tab")[1]);
        showToast('Address pre-filled — add details and click "Add to Map"');
      }

      // ── Marker helpers ──
      function addMarker(prop) {
        if (!prop.geo) return null;
        const color = propColor(prop);
        const marker = L.marker([prop.geo.lat, prop.geo.lng], {
          icon: makeIcon(color),
        })
          .addTo(map)
          .bindPopup(() => makePopup(prop));
        marker.on("click", () => selectProp(prop.index));
        return marker;
      }

      function makePopup(p) {
        return `<div class="popup-name">${escHtml(p.name)}</div>
    <div class="popup-row"><strong>Address:</strong> ${escHtml(p.address)}</div>
    ${p.price ? `<div class="popup-price">${escHtml(p.price)}</div>` : ""}
    ${p.other ? `<div class="popup-row" style="margin-top:4px;color:#9ca3af">${escHtml(p.other)}</div>` : ""}
    ${
      p.geo
        ? `<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
      <a href="https://www.google.com/maps/search/?api=1&query=${p.geo.lat},${p.geo.lng}" target="_blank"
         style="color:#60a5fa;font-size:11px;text-decoration:none">📍 Google Maps</a>
      <a href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${p.geo.lat},${p.geo.lng}" target="_blank"
         style="color:#60a5fa;font-size:11px;text-decoration:none">🚶 Street View</a>
      ${p.manual ? `<span onclick="openEdit(${p.index})" style="color:#34d399;font-size:11px;cursor:pointer">✏️ Edit</span>` : ""}
    </div>`
        : '<div style="color:#f87171;margin-top:4px;font-size:11px">⚠ Could not geocode</div>'
    }`;
      }

      function fitChicago() {
        const pts = allProperties
          .filter((p) => p.inCity && p.geo)
          .map((p) => [p.geo.lat, p.geo.lng]);
        if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.1));
      }

      // ── Stats ──
      function updateStats() {
        document.getElementById("stat-total").textContent =
          allProperties.length;
        document.getElementById("stat-chicago").textContent =
          allProperties.filter((p) => p.inCity).length;
        document.getElementById("stat-other").textContent =
          allProperties.filter((p) => !p.inCity).length;
      }

      // ── Filter + list ──
      function setFilter(f, el) {
        activeFilter = f;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        renderList();
      }

      function renderList() {
        const q = document.getElementById("searchBox").value.toLowerCase();
        const list = document.getElementById("propList");
        let props = allProperties.filter((p) => {
          if (activeFilter === "chicago" && !p.inCity) return false;
          if (activeFilter === "other" && p.inCity) return false;
          if (activeFilter === "manual" && !p.manual) return false;
          if (
            q &&
            !`${p.name} ${p.address} ${p.other} ${p.price}`
              .toLowerCase()
              .includes(q)
          )
            return false;
          return true;
        });
        if (!props.length) {
          list.innerHTML = `<div class="empty-state">${!allProperties.length ? "Upload a CSV or add a property<br/>to get started." : "No properties match."}</div>`;
          return;
        }
        list.innerHTML = props
          .map(
            (p) => `
    <div class="prop-item ${p.index === activeIndex ? "active" : ""}" onclick="selectProp(${p.index})">
      <div class="prop-name">${escHtml(p.name)}</div>
      <div class="prop-addr">${escHtml(p.address)}</div>
      ${p.price ? `<div class="prop-price">${escHtml(p.price)}</div>` : ""}
      <span class="prop-badge ${p.manual ? "badge-manual" : p.inCity ? "badge-chicago" : "badge-other"}">
        ${p.manual ? "✚ Added" : p.inCity ? "✓ Chicago" : "Outside Chicago"}
      </span>
      ${p.manual ? `<button class="prop-delete" title="Remove" onclick="event.stopPropagation();removeProp(${p.index})">✕</button>` : ""}
    </div>
  `,
          )
          .join("");
      }

      function selectProp(idx) {
        activeIndex = idx;
        const p = allProperties[idx];
        const m = markerObjects[idx];
        if (m && p.geo) {
          map.setView([p.geo.lat, p.geo.lng], 15);
          m.openPopup();
        }
        renderList();
        document
          .querySelector(".prop-item.active")
          ?.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }

      function removeProp(idx) {
        if (markerObjects[idx]) map.removeLayer(markerObjects[idx]);
        allProperties.splice(idx, 1);
        markerObjects.splice(idx, 1);
        // Re-index
        allProperties.forEach((p, i) => (p.index = i));
        if (activeIndex === idx) activeIndex = -1;
        else if (activeIndex > idx) activeIndex--;
        updateStats();
        renderList();
        showToast("Property removed.");
      }

      // ── Edit modal ──
      function openEdit(idx) {
        map.closePopup();
        editingIndex = idx;
        const p = allProperties[idx];
        document.getElementById("editName").value = p.name;
        document.getElementById("editAddress").value = p.address;
        document.getElementById("editPrice").value = p.price;
        document.getElementById("editOther").value = p.other;
        document.getElementById("editModal").classList.add("open");
      }

      function closeEdit() {
        document.getElementById("editModal").classList.remove("open");
        editingIndex = -1;
      }

      async function saveEdit() {
        const p = allProperties[editingIndex];
        const newAddr = document.getElementById("editAddress").value.trim();
        const addrChanged = newAddr !== p.address;

        p.name = document.getElementById("editName").value.trim() || newAddr;
        p.address = newAddr;
        p.price = document.getElementById("editPrice").value.trim();
        p.other = document.getElementById("editOther").value.trim();

        if (addrChanged) {
          if (markerObjects[editingIndex])
            map.removeLayer(markerObjects[editingIndex]);
          const results = await geocode(newAddr);
          p.geo = results[0]
            ? {
                lat: parseFloat(results[0].lat),
                lng: parseFloat(results[0].lon),
              }
            : null;
          p.inCity = p.geo ? isInChicago(p.geo.lat, p.geo.lng) : false;
          markerObjects[editingIndex] = addMarker(p);
        } else if (markerObjects[editingIndex]) {
          markerObjects[editingIndex].setPopupContent(makePopup(p));
          markerObjects[editingIndex].setIcon(makeIcon(propColor(p)));
        }

        closeEdit();
        updateStats();
        renderList();
        showToast("Property updated.");
      }

      // ── Utilities ──
      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function escJs(s) {
        return String(s).replace(/'/g, "\\'").replace(/\n/g, " ");
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("show"), 3500);
      }
    </script>
  </body>
</html>
